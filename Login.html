<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- Ensures the website scales correctly on mobile devices -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <title>Sign In - DIS Innovation LTD</title>
  
  <!-- Pulling in Tailwind CSS for rapid styling without writing custom CSS classes -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- We're loading Material Icons for classic Google-style icons -->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  
  <!-- Lucide is loaded here for sleek, modern outline icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <!-- This pulls in Apple's San Francisco Pro font for that premium iOS/macOS look -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/sahibjotsaggu/San-Francisco-Pro-Fonts@master/fonts.css" />
  
  <style>
    /* Applying the SF Pro font to everything on the page */
    *{ font-family: "SF Pro Display", sans-serif; }
    
    /* Gives a smooth gliding effect when clicking anchor links that jump down the page */
    html{ scroll-behavior:smooth; }
    
    /* Prevents annoying horizontal scrolling if an element accidentally pushes past the screen width */
    body{ overflow-x:hidden; }
  </style>
</head>

<!-- 'flex flex-col min-h-screen' ensures the footer stays at the absolute bottom even if content is short -->
<body class="bg-neutral-950 text-white antialiased flex flex-col min-h-screen">

  <!-- 
    ======================================
    THE NAVIGATION BAR 
    ======================================
    We make it stick to the top ('fixed top-0'), add a dark transparent background ('bg-neutral-950/90'), 
    and a nice frosted glass effect ('backdrop-blur-xl') so content beautifully blurs as it scrolls underneath.
  -->
  <nav class="fixed top-0 left-0 w-full z-50 border-b border-neutral-900 bg-neutral-950/90 backdrop-blur-xl">
    <div class="mx-auto h-20 px-4 flex items-center justify-between">
      
      <!-- Brand Logo & Name: Clicking this always takes you back home -->
      <a href="Main.html" class="flex items-center gap-3 cursor-pointer">
        <img src="/imgs/image.png" alt="DIS Logo" class="w-8 h-8 object-contain">
        <h2 class="text-sm md:text-base tracking-tight font-medium">DIS Innovation</h2>
      </a>
      
      <!-- 
        Desktop Navigation Links 
        These are hidden on small mobile screens ('hidden') and only show up on larger screens ('lg:flex'). 
      -->
      <div class="hidden lg:flex items-center gap-8 text-sm text-neutral-500">
        <a href="Main.html" class="hover:text-white transition">Home</a>
        <a href="About.html" class="hover:text-white transition">About</a>
        <a href="Services.html" class="hover:text-white transition">Services</a>
        <a href="Products.html" class="hover:text-white transition">Products</a>
        <a href="Careers.html" class="hover:text-white transition">Careers</a>
        <a href="Contact.html" class="hover:text-white transition">Contact</a>
      </div>
      
      <!-- Call-to-Action Buttons (Desktop) -->
      <div class="hidden md:flex items-center gap-3">
        <button class="px-5 py-2.5 rounded-xl border border-neutral-800 hover:border-neutral-700 hover:bg-neutral-900 transition text-sm">
          <a href="Login.html">Sign in</a>
        </button>
        <button class="px-5 py-2.5 rounded-xl bg-white text-black hover:opacity-90 transition text-sm font-medium">
          <a href="SignUp.html">Get Started</a>
        </button>
      </div>
      
      <!-- Hamburger Menu Button (Mobile) -->
      <button id="menuBtn" class="md:hidden border border-neutral-800 rounded-xl p-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8h16M4 16h16"/>
        </svg>
      </button>
      
    </div>
    
    <!-- The Mobile Menu Panel -->
    <div id="mobileMenu" class="hidden md:hidden border-t border-neutral-900 bg-neutral-950">
      <div class="w-[92%] mx-auto py-6 flex flex-col gap-6 text-neutral-400 text-sm">
        <a href="Main.html" class="hover:text-white transition">Home</a>
        <a href="About.html" class="hover:text-white transition">About</a>
        <a href="Services.html" class="hover:text-white transition">Services</a>
        <a href="Products.html" class="hover:text-white transition">Products</a>
        <a href="Careers.html" class="hover:text-white transition">Careers</a>
        <a href="Contact.html" class="hover:text-white transition">Contact</a>
        <div class="flex flex-col gap-3 pt-4">
          <button class="w-full border border-neutral-800 py-3 rounded-xl">
            <a href="Login.html">Sign in</a>
          </button>
          <button class="w-full bg-white text-black py-3 rounded-xl font-medium">
            <a href="SignUp.html">Get Started</a>
          </button>
        </div>
      </div>
    </div>
  </nav>

  <!-- 
    ======================================
    MAIN CONTENT: LOGIN FORM
    ======================================
    Uses 'flex-grow' so it takes up any remaining space between the navbar and footer, keeping it perfectly centered.
  -->
  <main class="flex-grow flex items-center justify-center pt-32 pb-20 w-[92%] max-w-7xl mx-auto">
    
    <!-- The main form container card -->
    <div class="w-full max-w-md bg-neutral-950 border border-neutral-900 rounded-[2rem] p-8 sm:p-10 relative overflow-hidden">
      
      <!-- A subtle, white glowing blur effect placed at the absolute top of the card using negative margins ('-translate-x-1/2') to center it -->
      <div class="absolute top-0 left-1/2 -translate-x-1/2 w-full h-32 bg-white/5 blur-[80px] rounded-full pointer-events-none"></div>

      <div class="text-center mb-8">
        <h1 class="text-3xl font-medium tracking-tight mb-2">Welcome back</h1>
        <p class="text-sm text-neutral-500">Sign in to your account to continue</p>
      </div>

      <form class="space-y-5" action="Main.html">
        
        <!-- Email Input -->
        <div class="space-y-2">
          <label class="text-sm text-neutral-400 font-medium ml-1">Email address</label>
          <input type="email" placeholder="name@company.com" class="w-full bg-neutral-900/50 border border-neutral-800 rounded-xl px-4 py-3.5 text-white placeholder:text-neutral-600 focus:outline-none focus:border-neutral-600 focus:ring-1 focus:ring-neutral-600 transition" required>
        </div>

        <!-- Password Input -->
        <div class="space-y-2">
          <!-- The label and the 'Forgot Password' link are flexed to opposite ends -->
          <div class="flex items-center justify-between ml-1">
            <label class="text-sm text-neutral-400 font-medium">Password</label>
            <a href="#" class="text-xs text-neutral-500 hover:text-white transition">Forgot password?</a>
          </div>
          <input type="password" placeholder="••••••••" class="w-full bg-neutral-900/50 border border-neutral-800 rounded-xl px-4 py-3.5 text-white placeholder:text-neutral-600 focus:outline-none focus:border-neutral-600 focus:ring-1 focus:ring-neutral-600 transition" required>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="w-full bg-white text-black py-3.5 rounded-xl font-medium hover:opacity-90 transition mt-4">
          Sign in
        </button>

      </form>

      <!-- Link to Sign Up Page -->
      <div class="mt-8 text-center text-sm text-neutral-500">
        Don't have an account? 
        <a href="SignUp.html" class="text-white hover:underline transition">Sign up</a>
      </div>

    </div>
  </main>

  <!-- 
    ======================================
    FOOTER SECTION
    ======================================
    Standard bottom area with copyright info and legal links.
  -->
  <footer class="border-t border-neutral-900 py-10 mt-auto">
    <div class="w-[92%] max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-between gap-8">
      
      <div class="flex items-center gap-3">
        <img src="/imgs/image.png" alt="logo" class="w-8 h-8">
        <span class="font-medium">DIS Innovation</span>
      </div>
      
      <p class="text-sm text-neutral-500 text-center">© 2026 DIS Innovation LTD. All rights reserved.</p>
      
      <div class="flex items-center gap-6 text-sm text-neutral-500">
        <a href="#" class="hover:text-white transition">Privacy</a>
        <a href="#" class="hover:text-white transition">Terms</a>
        <a href="#" class="hover:text-white transition">Support</a>
      </div>
      
    </div>
  </footer>

  <!-- 
    ======================================
    JAVASCRIPT CODE
    ======================================
  -->
  <script>
    // Tells the Lucide library to find any <i data-lucide="..."> tags and render SVG icons
    lucide.createIcons();
    
    // Grab the hamburger menu button and the actual mobile menu panel
    const menuBtn = document.getElementById("menuBtn");
    const mobileMenu = document.getElementById("mobileMenu");
    
    // Toggle the 'hidden' class when the menu button is clicked
    menuBtn.addEventListener("click", () => { 
      mobileMenu.classList.toggle("hidden"); 
    });
  </script>
</body>
</html>
